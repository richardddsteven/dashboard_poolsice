<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Case Diagram - Bab 3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 32px;
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 26px; color: #1565C0; }
        .subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 14px; }
        .diagram-section {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 28px;
            margin-bottom: 28px;
            max-width: 1600px;
            margin-left: auto;
            margin-right: auto;
        }
        .diagram-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .diagram-header h2 { font-size: 18px; color: #333; }
        .btn-group { display: flex; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; color: #fff; border: none;
            border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { filter: brightness(0.9); }
        .btn-png { background: #1565C0; }
        .btn-svg { background: #6A1B9A; }
        .diagram-container {
            display: flex; justify-content: center;
            padding: 12px 0; min-height: 300px;
            overflow-x: auto;
        }
        .diagram-container svg { max-width: 100%; height: auto; }
        .loading-text { color: #E65100; font-weight: 600; text-align: center; padding: 60px; font-size: 16px; }
        .status { text-align: center; margin-bottom: 24px; font-size: 14px; color: #888; min-height: 22px; }
        .success { color: #2E7D32; font-weight: 600; }
    </style>
</head>
<body>

<h1>📋 Use Case Diagram - Bab 3</h1>
<p class="subtitle">Use Case Diagram sistem Pools Ice — semua aktor dan use case dalam satu diagram.</p>

<div class="status" id="global-status"></div>

<div class="diagram-section">
    <div class="diagram-header">
        <h2>Use Case Diagram — Sistem Pools Ice</h2>
        <div class="btn-group">
            <button class="btn btn-svg" onclick="downloadSVG()">⬇ SVG</button>
            <button class="btn btn-png" onclick="downloadPNG()">⬇ PNG</button>
        </div>
    </div>
    <div class="diagram-container" id="container0"><p class="loading-text">⏳ Rendering...</p></div>
</div>

<script>
const diagramCode = `@startuml
scale 1.5
skinparam backgroundColor #FFFFFF
skinparam shadowing false
skinparam ActorFontSize 18
skinparam ActorFontStyle bold
skinparam UsecaseFontSize 16
skinparam UsecaseBorderColor #000000
skinparam UsecaseBackgroundColor #FFFFFF
skinparam ArrowColor #000000
skinparam ArrowThickness 1.5
skinparam ActorBorderColor #000000
skinparam ActorBackgroundColor #FFFFFF
skinparam RectangleBorderColor #000000
skinparam RectangleBorderThickness 2.5
skinparam RectangleFontSize 18
skinparam RectangleFontStyle bold

left to right direction

actor "Pelanggan" as P
actor "Admin" as A
actor "Layanan Geocoding" as G

rectangle "Sistem Pools Ice" {
    usecase "Memesan es batu via WhatsApp" as UC1
    usecase "Registrasi pelanggan baru" as UC2
    usecase "Mengirim nama toko" as UC3
    usecase "Mengirim alamat toko" as UC4
    usecase "Deteksi zona & koordinat alamat" as UC5
    usecase "Menyimpan order status pending" as UC6
    usecase "Menerima konfirmasi pesanan" as UC26

    usecase "Memantau order real-time" as UC7
    usecase "Mengelola data pelanggan" as UC8
    usecase "Mengelola data supir" as UC9
    usecase "Mengelola zona pengiriman" as UC10
    usecase "Mengelola tipe es batu" as UC11
    usecase "Mengatur stok global harian" as UC12
    usecase "Memantau sisa stok supir harian" as UC13
    usecase "Memantau laporan keuangan" as UC14
    usecase "Mencatat pengeluaran" as UC15

    usecase "Login ke Driver App" as UC16
    usecase "Input stok bawaan hari ini" as UC17
    usecase "Melihat daftar order zona" as UC18
    usecase "Approve order" as UC19
    usecase "Reject order" as UC20
    usecase "Validasi stok saat approve" as UC21
    usecase "Selesai antar (GPS)" as UC22
    usecase "Validasi jarak ke koordinat pelanggan" as UC23
    usecase "Kurangi stok saat order completed" as UC24
    usecase "Melihat stok hari ini" as UC25
}

actor "Supir" as D

P --> UC1
P --> UC26
UC1 ..> UC2 : <<extend>>
UC2 ..> UC3 : <<include>>
UC2 ..> UC4 : <<include>>
UC4 ..> UC5 : <<include>>
UC1 ..> UC6 : <<include>>
UC1 ..> UC26 : <<include>>

A --> UC7
A --> UC8
A --> UC9
A --> UC10
A --> UC11
A --> UC12
A --> UC13
A --> UC14
A --> UC15

G --> UC5

D --> UC16
D --> UC17
D --> UC18
D --> UC19
D --> UC20
D --> UC22
D --> UC25

UC19 ..> UC21 : <<include>>
UC22 ..> UC23 : <<include>>
UC22 ..> UC24 : <<include>>

@enduml`;

let svgCache = null;

async function renderDiagram() {
    const container = document.getElementById('container0');
    const status = document.getElementById('global-status');
    status.innerHTML = '<span style="color:#E65100;font-weight:600;">⏳ Rendering diagram via Kroki.io...</span>';
    try {
        const response = await fetch('https://kroki.io/plantuml/svg', {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: diagramCode
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error('HTTP ' + response.status + ' — ' + errText.substring(0, 200));
        }
        const svgText = await response.text();
        svgCache = svgText;
        container.innerHTML = svgText;
        const svg = container.querySelector('svg');
        if (svg) { svg.style.maxWidth = '100%'; svg.style.height = 'auto'; }
        status.innerHTML = '<span class="success">✅ Diagram berhasil di-render! Silakan download.</span>';
    } catch (e) {
        container.innerHTML = '<p style="color:red;text-align:center;padding:20px;">❌ Gagal render: ' + e.message + '<br><small>Pastikan koneksi internet aktif.</small></p>';
        status.innerHTML = '';
        console.error(e);
    }
}

function downloadSVG() {
    if (!svgCache) { alert('Diagram belum ter-render.'); return; }
    const blob = new Blob([svgCache], { type: 'image/svg+xml;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'UC_Sistem_Pools_Ice.svg';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
}

function downloadPNG() {
    if (!svgCache) { alert('Diagram belum ter-render.'); return; }
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(svgCache, 'image/svg+xml');
    const svgEl = svgDoc.querySelector('svg');
    let w = parseFloat(svgEl.getAttribute('width')) || 1400;
    let h = parseFloat(svgEl.getAttribute('height')) || 900;
    const scale = 3;
    const canvas = document.createElement('canvas');
    canvas.width = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const encodedSvg = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgCache);
    img.onload = function() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'UC_Sistem_Pools_Ice.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
    img.onerror = function() {
        alert('PNG export gagal. Mengunduh SVG sebagai alternatif.');
        downloadSVG();
    };
    img.src = encodedSvg;
}

renderDiagram();
</script>
</body>
</html>
