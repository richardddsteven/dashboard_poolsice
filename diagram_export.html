            gap: 8px;
            flex-wrap: wrap;

            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #1565C0;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-download:hover {
            background: #0D47A1;
        }

        .btn-download.svg-btn {
            background: #6A1B9A;
        }

        .btn-download.svg-btn:hover {
            background: #4A148C;
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .diagram-container {
            overflow-x: auto;
            display: flex;
            justify-content: center;
            padding: 16px 0;
            min-height: 200px;
        }

        .btn-download-all {
            display: block;
            margin: 0 auto 20px;
            padding: 14px 36px;
            background: #2E7D32;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-download-all:hover {
            background: #1B5E20;
        }

        .status {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #888;
            min-height: 24px;
        }

        .loading {
            color: #E65100;
            font-weight: 600;
        }

        .success {
            color: #2E7D32;
            font-weight: 600;
        }

        /* Interactive styles for Custom ERD */
        .erd-svg {
            user-select: none;
            overflow: visible;
        }
        .erd-table {
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .erd-relation {
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .erd-relation path {
            transition: stroke 0.25s ease, stroke-width 0.25s ease;
        }
        .erd-relation rect, .erd-relation text {
            transition: fill 0.25s ease, stroke 0.25s ease, opacity 0.25s ease;
        }
        
        /* Highlight modes */
        .erd-svg.highlight-active .erd-table:not(.highlighted) {
            opacity: 0.2;
        }
        .erd-svg.highlight-active .erd-relation:not(.highlighted) {
            opacity: 0.1;
        }
        .erd-svg.highlight-active .erd-relation.highlighted path.relation-path {
            stroke-width: 3px !important;
            stroke: #D81B60 !important; /* Sleek highlighted pink */

        .erd-svg.highlight-active .erd-relation.highlighted .relation-label rect {

        const gaps = {
            1: 350, // Between Col 1 and Col 2
            2: 725, // Between Col 2 and Col 3
            3: 1105 // Between Col 3 and Col 4
        };

        function getTableCol(tableId) {
            if (["users", "ice_types", "expense_categories"].includes(tableId)) return 1;
            if (["zones", "route_stops"].includes(tableId)) return 2;
            if (["customers", "drivers", "orders"].includes(tableId)) return 3;
            if (["stocks", "driver_stocks", "ice_type_driver_stocks", "expenses"].includes(tableId)) return 4;
            return 1;
        }

        // Get safe orthogonal path routing
        function getOrthogonalPath(x1, y1, x2, y2, fromTable, toTable) {
            const col1 = getTableCol(fromTable);
            const col2 = getTableCol(toTable);
            
            if (col1 === col2) {
                const dy = Math.abs(y2 - y1);
                const dx = Math.max(50, dy * 0.35);
                return `M ${x1},${y1} C ${x1 + dx},${y1} ${x2 + dx},${y2} ${x2},${y2}`;
            }
            
            const diff = Math.abs(col2 - col1);
            
            if (diff === 1) {
                const gapCol = Math.min(col1, col2);
                const gapX = gaps[gapCol];
                return `M ${x1},${y1} H ${gapX} V ${y2} H ${x2}`;
            }
            
            if (diff === 2) {
                const gap1 = gaps[1];
                const gap2 = gaps[2];
                const bypassY = 660; 
                return `M ${x1},${y1} H ${gap1} V ${bypassY} H ${gap2} V ${y2} H ${x2}`;
            }
            
            if (diff === 3) {
                const gap1 = gaps[1];
                const gap3 = gaps[3];
                const bypassY = y1 > 500 ? 1000 : 20;
                return `M ${x1},${y1} H ${gap1} V ${bypassY} H ${gap3} V ${y2} H ${x2}`;
            }
            
            return `M ${x1},${y1} H ${(x1 + x2)/2} V ${y2} H ${x2}`;
        }

        // Get label center coordinates
        function getLabelCoords(x1, y1, x2, y2, fromTable, toTable) {
            const col1 = getTableCol(fromTable);
            const col2 = getTableCol(toTable);
            
            if (col1 === col2) {
                const dy = Math.abs(y2 - y1);
                const dx = Math.max(50, dy * 0.35);
                return { x: x1 + dx, y: (y1 + y2) / 2 };
            }
            
            const diff = Math.abs(col2 - col1);
            
            if (diff === 1) {
                const gapCol = Math.min(col1, col2);
                return { x: gaps[gapCol], y: (y1 + y2) / 2 };
            }
            
            if (diff === 2) {
                return { x: (gaps[1] + gaps[2]) / 2, y: 660 };
            }
            
            if (diff === 3) {
                const bypassY = y1 > 500 ? 1000 : 20;
                return { x: (gaps[1] + gaps[3]) / 2, y: bypassY };
            }
            
            return { x: (x1 + x2) / 2, y: (y1 + y2) / 2 };
        }

        // Main custom ERD rendering function
        function renderCustomERD(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const width = 240;
            const rowHeight = 22;
            const headerHeight = 36;
            const svgWidth = 1520;
            const svgHeight = 1050;

            let svgHtml = `
            <svg class="erd-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" width="1520" height="1050" xmlns="http://www.w3.org/2000/svg" style="background:#fcfcfd; border-radius:12px; box-shadow: inset 0 0 40px rgba(0,0,0,0.015);">
                <defs>
                    <!-- Grid Pattern -->
                    <pattern id="erd-grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5" opacity="0.6"/>
                    </pattern>
                    
                    <!-- Markers for Relationships (1 to Many) -->
                    <marker id="one-marker" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <circle cx="5" cy="5" r="3" fill="#475569" />
                    </marker>
                    <marker id="many-marker" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                        <path d="M 9 2 L 2 5 L 9 8 M 2 5 L 9 5" stroke="#475569" stroke-width="1.5" fill="none" />
                    </marker>
                    
                    <!-- Highlight Markers -->
                    <marker id="one-marker-hl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                        <circle cx="5" cy="5" r="3" fill="#D81B60" />
                    </marker>
                    <marker id="many-marker-hl" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                        <path d="M 9 2 L 2 5 L 9 8 M 2 5 L 9 5" stroke="#D81B60" stroke-width="1.5" fill="none" />
                    </marker>

                    <!-- Drop Shadows -->
                    <filter id="table-shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.05"/>
                        <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.03"/>
                    </filter>
                    
                    <filter id="table-shadow-active" x="-15%" y="-15%" width="130%" height="130%">
                        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.1"/>
                    </filter>
                </defs>
                
                <!-- Grid Background -->
                <rect width="100%" height="100%" fill="url(#erd-grid)" />
            `;

            function getFieldInfo(tableId, fieldName) {
                const table = erdTables.find(t => t.id === tableId);
                if (!table) return null;
                const index = table.columns.findIndex(c => c.name === fieldName);
                return { table, index };
            }

            // 1. Draw Relationships
            let relationsHtml = '<g class="relations-group">';
            erdRelations.forEach((rel, rIdx) => {
                const fromInfo = getFieldInfo(rel.from, rel.fromField);
                const toInfo = getFieldInfo(rel.to, rel.toField);
                
                if (!fromInfo || !toInfo) return;
                
                const tableA = fromInfo.table;
                const tableB = toInfo.table;
                
                const fieldAY = tableA.y + headerHeight + (fromInfo.index * rowHeight) + (rowHeight / 2);
                const fieldBY = tableB.y + headerHeight + (toInfo.index * rowHeight) + (rowHeight / 2);
                
                let x1, y1, x2, y2;
                
                if (tableA.x < tableB.x) {
                    x1 = tableA.x + width;
                    y1 = fieldAY;
                    x2 = tableB.x;
                    y2 = fieldBY;
                } else if (tableA.x > tableB.x) {
                    x1 = tableA.x;
                    y1 = fieldAY;
                    x2 = tableB.x + width;
                    y2 = fieldBY;
                } else {
                    x1 = tableA.x + width;
                    y1 = fieldAY;
                    x2 = tableB.x + width;
                    y2 = fieldBY;
                }
                
                const pathData = getOrthogonalPath(x1, y1, x2, y2, rel.from, rel.to);
                const mid = getLabelCoords(x1, y1, x2, y2, rel.from, rel.to);
                
                relationsHtml += `
                <g class="erd-relation" id="rel-${rIdx}" data-from="${rel.from}" data-to="${rel.to}" style="cursor: pointer;">
                    <path d="${pathData}" fill="none" stroke="transparent" stroke-width="12" />
                    <path class="relation-path" d="${pathData}" fill="none" stroke="#64748b" stroke-width="1.5" 
                          marker-start="url(#one-marker)" marker-end="url(#many-marker)" />
                    <g class="relation-label" transform="translate(${mid.x}, ${mid.y})">
                        <rect x="-42" y="-10" width="84" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
                        <text x="0" y="4" font-family="'Segoe UI', system-ui, sans-serif" font-size="10px" font-weight="600" fill="#475569" text-anchor="middle">${rel.label}</text>
                    </g>
                </g>
                `;
            });
            relationsHtml += '</g>';
            svgHtml += relationsHtml;

            // 2. Draw Tables
            let tablesHtml = '<g class="tables-group">';
            erdTables.forEach(table => {
                const tableHeight = headerHeight + (table.columns.length * rowHeight) + 8;
                
                tablesHtml += `
                <g class="erd-table" id="table-${table.id}" transform="translate(${table.x}, ${table.y})" data-id="${table.id}">
                    <rect width="${width}" height="${tableHeight}" rx="10" fill="#ffffff" filter="url(#table-shadow)" stroke="#cbd5e1" stroke-width="1" />
                    <path d="M 0 10 A 10 10 0 0 1 10 0 L ${width - 10} 0 A 10 10 0 0 1 ${width} 10 L ${width} ${headerHeight} L 0 ${headerHeight} Z" fill="${table.color}" />
                    <text x="${width / 2}" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13px" font-weight="700" fill="#ffffff" text-anchor="middle">${table.name}</text>
                `;
                
                table.columns.forEach((col, idx) => {
                    const rowY = headerHeight + (idx * rowHeight);
                    const isAlt = idx % 2 === 1;
                    const rowBg = isAlt ? '#f8fafc' : '#ffffff';
                    
                    tablesHtml += `
                    <rect y="${rowY}" width="${width}" height="${rowHeight}" fill="${rowBg}" />
                    `;
                    
                    let nameX = 14;
                    if (col.key) {
                        const badgeColor = col.key === 'PK' ? '#fef08a' : '#dbeafe';
                        const badgeTextColor = col.key === 'PK' ? '#713f12' : '#1e40af';
                        tablesHtml += `
                        <rect x="12" y="${rowY + 4}" width="20" height="14" rx="4" fill="${badgeColor}" />
                        <text x="22" y="${rowY + 14}" font-family="'Segoe UI', sans-serif" font-size="9px" font-weight="800" fill="${badgeTextColor}" text-anchor="middle">${col.key}</text>
                        `;
                        nameX = 38;
                    }
                    
                    const isKey = !!col.key;
                    const nameFontWeight = isKey ? '700' : '500';
                    const nameTextColor = isKey ? '#0f172a' : '#334155';
                    
                    tablesHtml += `
                    <text x="${nameX}" y="${rowY + 15}" font-family="'Segoe UI', sans-serif" font-size="11.5px" font-weight="${nameFontWeight}" fill="${nameTextColor}">${col.name}</text>
                    <text x="${width - 12}" y="${rowY + 15}" font-family="'Segoe UI', sans-serif" font-size="10.5px" font-style="italic" fill="#64748b" text-anchor="end">${col.type}</text>
                    `;
                });
                
                tablesHtml += `
                </g>
                `;
            });
            tablesHtml += '</g>';
            svgHtml += tablesHtml;
            
            svgHtml += `</svg>`;
            container.innerHTML = svgHtml;
            
            // Interaction logic
            const svgEl = container.querySelector('.erd-svg');
            const tableEls = container.querySelectorAll('.erd-table');
            const relationEls = container.querySelectorAll('.erd-relation');
            
            tableEls.forEach(tableEl => {
                tableEl.addEventListener('mouseenter', () => {
                    const tableId = tableEl.getAttribute('data-id');
                    svgEl.classList.add('highlight-active');
                    tableEl.classList.add('highlighted');
                    tableEl.setAttribute('filter', 'url(#table-shadow-active)');
                    
                    relationEls.forEach(relEl => {
                        const from = relEl.getAttribute('data-from');
                        const to = relEl.getAttribute('data-to');
                        if (from === tableId || to === tableId) {
                            relEl.classList.add('highlighted');
                            const path = relEl.querySelector('.relation-path');
                            path.setAttribute('marker-start', 'url(#one-marker-hl)');
                            path.setAttribute('marker-end', 'url(#many-marker-hl)');
                            
                            const otherTableId = from === tableId ? to : from;
                            const otherTableEl = container.querySelector(`#table-${otherTableId}`);
                            if (otherTableEl) {
                                otherTableEl.classList.add('highlighted');
                            }
                        }
                    });
                });
                
                tableEl.addEventListener('mouseleave', () => {
                    svgEl.classList.remove('highlight-active');
                    tableEls.forEach(t => {
                        t.classList.remove('highlighted');
                        t.setAttribute('filter', 'url(#table-shadow)');
                    });
                    relationEls.forEach(r => {
                        r.classList.remove('highlighted');
                        const path = r.querySelector('.relation-path');
                        path.setAttribute('marker-start', 'url(#one-marker)');
                        path.setAttribute('marker-end', 'url(#many-marker)');
                    });
                });
            });

            relationEls.forEach(relEl => {
                relEl.addEventListener('mouseenter', () => {
                    const from = relEl.getAttribute('data-from');
                    const to = relEl.getAttribute('data-to');
                    
                    svgEl.classList.add('highlight-active');
                    relEl.classList.add('highlighted');
                    
                    const path = relEl.querySelector('.relation-path');
                    path.setAttribute('marker-start', 'url(#one-marker-hl)');
                    path.setAttribute('marker-end', 'url(#many-marker-hl)');
                    
                    const t1 = container.querySelector(`#table-${from}`);
                    const t2 = container.querySelector(`#table-${to}`);
                    if (t1) { t1.classList.add('highlighted'); t1.setAttribute('filter', 'url(#table-shadow-active)'); }
                    if (t2) { t2.classList.add('highlighted'); t2.setAttribute('filter', 'url(#table-shadow-active)'); }
                });
                
                relEl.addEventListener('mouseleave', () => {
                    svgEl.classList.remove('highlight-active');
                    tableEls.forEach(t => {
                        t.classList.remove('highlighted');
                        t.setAttribute('filter', 'url(#table-shadow)');
                    });
                    relationEls.forEach(r => {
                        r.classList.remove('highlighted');
                        const path = r.querySelector('.relation-path');
                        path.setAttribute('marker-start', 'url(#one-marker)');
                        path.setAttribute('marker-end', 'url(#many-marker)');
                    });
                });
            });
        }

        // Render all diagrams on load
        async function renderAll() {
            const status = document.getElementById('global-status');
            status.innerHTML = '<span class="loading">⏳ Rendering semua diagram...</span>';

            for (const [id, diag] of Object.entries(diagrams)) {
                try {
                    if (id === 'diagram3') {
                        renderCustomERD(id);
                    } else {
                        const { svg } = await mermaid.render(id + '_svg', diag.code);
                        document.getElementById(id).innerHTML = svg;
                    }
                } catch (e) {
                    document.getElementById(id).innerHTML = '<p style="color:red;">Error rendering: ' + e.message + '</p>';
                    console.error('Error rendering ' + id, e);
                }
            }

            status.innerHTML = '<span class="success">✅ Semua diagram berhasil di-render! Silakan download.</span>';
        }

        // Download as SVG
        function downloadSVG(containerId, filename) {
            const container = document.getElementById(containerId);
            const svgEl = container.querySelector('svg');
            if (!svgEl) { alert('Diagram belum ter-render.'); return; }

            const clone = svgEl.cloneNode(true);
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

            const serializer = new XMLSerializer();
            const svgString = '<?xml version="1.0" encoding="UTF-8"?>\n' + serializer.serializeToString(clone);
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });

            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename + '.svg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }

        // Download as PNG (reliable method)
        function downloadPNG(containerId, filename) {
            const container = document.getElementById(containerId);
            const svgEl = container.querySelector('svg');
            if (!svgEl) { alert('Diagram belum ter-render.'); return; }

            const scale = 3;
            const clone = svgEl.cloneNode(true);

            // Get actual size
            const bbox = svgEl.getBBox();
            const pad = 40;
            const w = bbox.width + pad * 2;
            const h = bbox.height + pad * 2;

            // Set viewBox and dimensions
            clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            clone.setAttribute('width', w);
            clone.setAttribute('height', h);
            clone.setAttribute('viewBox', `${bbox.x - pad} ${bbox.y - pad} ${w} ${h}`);

            // Add white background rect as first child
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', bbox.x - pad);
            bg.setAttribute('y', bbox.y - pad);
            bg.setAttribute('width', w);
            bg.setAttribute('height', h);
            bg.setAttribute('fill', '#ffffff');
            clone.insertBefore(bg, clone.firstChild);

            // Inline all computed styles for every element
            const originalElements = svgEl.querySelectorAll('*');
            const cloneElements = clone.querySelectorAll('*');
            for (let i = 0; i < originalElements.length; i++) {
                const computed = window.getComputedStyle(originalElements[i]);
                let styleStr = '';
                for (let j = 0; j < computed.length; j++) {
                    const prop = computed[j];
                    styleStr += `${prop}:${computed.getPropertyValue(prop)};`;
                }
                cloneElements[i].setAttribute('style', styleStr);
            }

            // Serialize to data URL
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(clone);
            const encodedSvg = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);

            // Draw to canvas
            const canvas = document.createElement('canvas');
            canvas.width = w * scale;
            canvas.height = h * scale;
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.onload = function () {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = filename + '.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            img.onerror = function () {
                alert('PNG export gagal untuk ' + filename + '. Gunakan tombol SVG sebagai alternatif.');
            };
            img.src = encodedSvg;
        }

        // Download all as PNG
        async function downloadAllPNG() {
            const status = document.getElementById('global-status');
            const entries = Object.entries(diagrams);

            for (let i = 0; i < entries.length; i++) {
                const [id, diag] = entries[i];
                status.innerHTML = `<span class="loading">⬇️ Mengunduh ${i + 1}/${entries.length}: ${diag.name}...</span>`;
                downloadPNG(id, diag.name);
                await new Promise(r => setTimeout(r, 1500));
            }

            status.innerHTML = '<span class="success">✅ Semua diagram berhasil diunduh!</span>';
            setTimeout(() => { status.textContent = ''; }, 5000);
        }

        // Start rendering
        renderAll();
        </script>
    </div>
</body>
